name: Deploy to GitHub Pages

# Публикация только из main; dev - рабочая ветка, не деплоится.
# workflow_dispatch - ручной запуск из вкладки Actions.
on:
    push:
        branches: [main]
    workflow_dispatch:

# Права для официального деплоя в Pages через OIDC.
permissions:
    contents: read
    pages: write
    id-token: write

# Один прогон за раз; новый push отменяет предыдущий незавершенный.
concurrency:
    group: pages
    cancel-in-progress: true

jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: oven-sh/setup-bun@v2
              with:
                  bun-version: "1.3.14"
            - run: bun install --frozen-lockfile
            - run: bun run build
            - uses: actions/upload-pages-artifact@v3
              with:
                  path: ./dist

    deploy:
        needs: build
        runs-on: ubuntu-latest
        environment:
            name: github-pages
            url: ${{ steps.deployment.outputs.page_url }}
        steps:
            - id: deployment
              uses: actions/deploy-pages@v4
